# jobs:
#   build-and-deploy:
#     1. 코드 체크아웃
#     2. GHCR 로그인
#     3. Docker 이미지 빌드 + 푸시 (태그 2개: latest, 커밋 SHA)
#     4. Render Deploy Hook 호출

name: CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3 # GHCR 로그인
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          push: true
          tags: | # 태그 동시에 2개 붙이기
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
      - run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }} # Render Deploy Hook 호출
