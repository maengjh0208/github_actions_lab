# 워크플로우 이름
name: CI

# 트리거 - 언제 실행할 지
on:
  push:
    branches:
      - "feature/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main

# jobs 선언 + job 이름
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip # pip 이 패키지를 저장하는 위치
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }} # key는 캐시를 구분하는 식별자. hashFiles('requirements.txt')는 requirements.txt 내용의 해시값. 파일이 바뀌면 해시가 바뀜 -> 캐시 무효화 -> 새로 설치
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install -r requirements.txt
          ruff check .
          black --check .

  test:
    runs-on: ubuntu-latest # 실행 환경 (ubuntu-latest Runner 서버 한 대를 새로 띄움)
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4 # 1. Runner는 비어있는 서버라서 코드가 없는데, 이 Action이 레포 코드를 Runner에 내려받음
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
      - uses: actions/setup-python@v5 # 2. 파이썬 설치 (with로 버전을 지정하지 않으면 기본값이 설치됨)
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt # 3. 의존성 설치 (매번 새로운 Runner 라서항상 새로 설치해야 함)
      - run: pytest -v # 4. 테스트 코드 실행 (실패하면 워크플로우 전체가 실패 처리됨)
